<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus AI</title>

<style>
body {
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  background: #000;
  perspective: 1000px;
  margin: 0;
}

/* SPHERE */
.sphere {
  display: block;
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 100%;
  transform: translate(-50%, -50%);
  width: 200px;
  height: 200px;
  background: rgba(0, 0, 0, 0.15);
  backdrop-filter: blur(5px);
  box-shadow:
    0 0 50px 5px rgba(0, 0, 0, 0.5),
    inset 0 0 40px rgba(255, 255, 255, 0.5),
    inset 0 -20px 50px rgba(0, 0, 0, 0.2);
  z-index: 50;
  overflow: hidden;
  animation: float 6s ease-in-out infinite;
}

/* 👀 EYES (THIS WAS MISSING BEFORE) */
.sphere::before {
  content: '';
  position: absolute;
  top: 45%;
  left: 47%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 30px;
  background: white;
  border-radius: 3px;
  box-shadow: 30px 0 0 white;
  z-index: 60;
  animation: blink 4s infinite, lookAround 10s infinite ease-in-out;
}

/* GLOW */
.sphere::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  box-shadow:
    0 0 40px rgba(255, 255, 255, 0.1),
    0 0 80px rgba(0, 150, 255, 0.2),
    0 0 120px rgba(255, 0, 200, 0.15);
  animation: glowPulse 2s ease-in-out infinite;
}

/* LAVA */
.lava {
  filter: blur(25px);
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 100%;
  transform: translate(-50%, -50%);
  width: 190px;
  height: 190px;
  z-index: 10;
  mix-blend-mode: screen;
  animation: colorShift 20s linear infinite;
}

.lava::before {
  content: '';
  position: absolute;
  width: 120%;
  height: 120%;
  background:
    radial-gradient(circle at 30% 30%, #0066ff, transparent),
    radial-gradient(circle at 70% 30%, #ff00cc, transparent),
    radial-gradient(circle at 50% 60%, #00ff99, transparent),
    radial-gradient(circle at 80% 40%, #ff3300, transparent);
  filter: blur(8px);
}

.lava::after {
  content: '';
  position: absolute;
  width: 120%;
  height: 120%;
  background:
    radial-gradient(circle at 40% 40%, #0066ff, transparent),
    radial-gradient(circle at 60% 40%, #ff00cc, transparent),
    radial-gradient(circle at 50% 70%, #00ff99, transparent),
    radial-gradient(circle at 70% 50%, #ff3300, transparent);
  filter: blur(12px);
  animation: pulse 4s infinite alternate;
}

/* TEXT */
.text-container {
  position: absolute;
  bottom: 25%;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  text-align: center;
}

.floating-text {
  color: rgba(255,255,255,0.8);
  font-size: 1.8em;
  opacity: 0;
  transition: 0.5s;
}

/* WAVES */
.wave-container {
  position: absolute;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 3px;
}

.wave {
  width: 2px;
  height: 20px;
  background: rgba(255, 255, 255, 0.5);
  animation: wave 0.5s ease-in-out infinite;
  border-radius: 2px;
}

@keyframes wave {
  0%, 100% {
    height: calc(5px + (var(--i) * 2px));
    background: rgba(255, 255, 255, 0.2);
  }
  50% {
    height: calc(15px + (var(--i) * 3px));
    background: rgba(255, 255, 255, 0.8);
  }
}

/* ANIMATIONS */
@keyframes wave {
  0%,100% { height: 10px; }
  50% { height: 40px; }
}

@keyframes float {
  0%,100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, calc(-50% - 10px)); }
}

@keyframes colorShift {
  0% { filter: blur(25px) hue-rotate(0deg); }
  100% { filter: blur(25px) hue-rotate(360deg); }
}

@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 60px rgba(255,255,255,0.1); }
  50% { box-shadow: 0 0 80px rgba(255,255,255,0.2); }
}

@keyframes blink {
  0%,96% { height: 30px; }
  98% { height: 3px; }
  100% { height: 30px; }
}

@keyframes lookAround {
  0%,40% { left:47%; }
  50% { left:40%; }
  60% { left:54%; }
  75% { left:47%; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.15); }
}
</style>
</head>

<body>

<div class="lava"></div>
<div class="sphere"></div>

<div class="text-container">
  <div class="floating-text"></div>
</div>

<div class="wave-container"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const text = document.querySelector(".floating-text");
  const waveContainer = document.querySelector(".wave-container");

  const messages = [
    "Hello there! My name is MarcusAI.",
    "How are you?",
    "Let's talk!",
    "I'm here to help."];

  function showText(msg){
    text.style.opacity = 0;
    setTimeout(()=>{
      text.textContent = msg;
      text.style.opacity = 1;
    },300);
  }

  setInterval(()=>{
    showText(messages[Math.floor(Math.random()*messages.length)]);
  },4000);

  // Waves
  for(let i=0;i<60;i++){
    let w=document.createElement("div");
    w.className="wave";
    w.style.animationDelay=Math.random()+"s";
    waveContainer.appendChild(w);
  }

});
</script>

</body>
</html>
