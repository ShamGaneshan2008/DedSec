<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">Marcus <span>AI</span></div>
  <div class="status-pill">
    <div class="sdot"></div>
    <span id="statusLabel">Ready</span>
  </div>
</header>

<!-- Lava blob (colour spectrum) -->
<div class="lava" id="lava"></div>

<!-- Listening rings -->
<div class="rings" id="rings">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<!-- Glass sphere with eyes -->
<div class="sphere" id="sphere"></div>

<!-- Label under orb -->
<div class="orb-label" id="orbLabel"></div>

<!-- Waveform bars -->
<div class="waveform" id="waveform"></div>

<!-- Voice transcript -->
<div class="transcript" id="transcript"></div>

<!-- Voice controls -->
<div class="controls" id="controls">
  <button class="mic-btn" id="micBtn" title="Tap to speak">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="9" y1="22" x2="15" y2="22"/>
    </svg>
  </button>
  <div class="mode-toggle">
    <button class="mtab active" id="btnVoice" onclick="setMode('voice')">Voice</button>
    <button class="mtab"        id="btnChat"  onclick="setMode('chat')">Chat</button>
  </div>
</div>

<!-- Chat panel -->
<div class="chat-panel" id="chatPanel">
  <div class="divider-line"></div>
  <div class="messages" id="messages">
    <div class="typing" id="typing">
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>
  </div>
  <div class="input-row">
    <input class="chat-input" id="chatInput" type="text" placeholder="Message Marcus…" autocomplete="off"/>
    <button class="send-btn" id="sendBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
